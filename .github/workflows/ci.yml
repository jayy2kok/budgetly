name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-test:
        name: Analyze, Test & Build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.41.2"
                  channel: stable
                  cache: true

            - name: Install dependencies
              run: flutter pub get

            - name: Analyze code
              run: flutter analyze

            - name: Run tests
              run: flutter test --no-pub
              continue-on-error: true # Allow CI to pass while tests are being written

            - name: Build debug APK (validation)
              run: flutter build apk --debug
