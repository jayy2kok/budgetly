name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Release tag name (e.g. v0.0.1-prototype)"
                required: true
                default: "v0.0.1-prototype"

jobs:
    build-and-release:
        name: Build APK & Create Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
        defaults:
            run:
                working-directory: app

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.41.2"
                  channel: stable
                  cache: true

            - name: Install dependencies
              run: flutter pub get

            - name: Analyze code
              run: flutter analyze

            - name: Build debug APK
              run: flutter build apk --debug

            - name: Determine tag name
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
                  fi
              working-directory: .

            - name: Rename APK
              run: |
                  cp build/app/outputs/flutter-apk/app-debug.apk \
                     build/app/outputs/flutter-apk/budgetly-${{ steps.tag.outputs.TAG_NAME }}.apk

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.TAG_NAME }}
                  name: Budgetly ${{ steps.tag.outputs.TAG_NAME }}
                  body: |
                      ## Budgetly ${{ steps.tag.outputs.TAG_NAME }}

                      🚀 **Prototype Release**

                      ### Installation
                      1. Download `budgetly-${{ steps.tag.outputs.TAG_NAME }}.apk` below
                      2. Transfer to your Android device
                      3. Enable "Install from unknown sources" if prompted
                      4. Tap the APK to install

                      > ⚠️ This is an unsigned debug build for testing purposes only.
                  draft: false
                  prerelease: true
                  files: |
                      app/build/app/outputs/flutter-apk/budgetly-${{ steps.tag.outputs.TAG_NAME }}.apk
