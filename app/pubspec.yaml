name: budgetly
description: "Budgetly — Family Harmony Budget App"
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # HTTP Client
  dio: ^5.7.0

  # Auth
  google_sign_in: ^7.2.0

  # Serialization
  json_annotation: ^4.9.0

  # Formatting
  intl: ^0.20.2

  # Charts
  fl_chart: ^1.1.1

  # Google Fonts
  google_fonts: ^8.0.2

  # Permissions
  permission_handler: ^11.3.1

  # SMS Inbox reading (Android)
  flutter_sms_inbox: ^1.0.3

  # Local persistence
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
