openapi: 3.0.3
info:
  title: Budgetly API
  description: >
    Family Harmony Budget App — Collaborative household expense tracking
    with AI-powered SMS parsing, category budgets, and flexible N-member splits.
  version: 1.0.0
  contact:
    name: Budgetly Team

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Auth
    description: Google OAuth 2.0 authentication and JWT management
  - name: Family Groups
    description: Family group CRUD, invite, and member management
  - name: Categories
    description: Budget category management per family group
  - name: Transactions
    description: Expense/income transaction CRUD with filtering and pagination
  - name: Messages
    description: SMS processing — submit unprocessed messages for LLM analysis, confirm/reject parsed transactions
  - name: Pattern Registry
    description: Global regex pattern library — fetch, report, and sync SMS parsing patterns
  - name: Dashboard
    description: Aggregated dashboard and budget summary

paths:
  # ─────────────────────────── AUTH ───────────────────────────
  /auth/google:
    post:
      tags: [Auth]
      operationId: googleSignIn
      summary: Exchange Google ID token for app JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleSignInRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid Google token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh JWT token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────── FAMILY GROUPS ─────────────────────
  /families:
    post:
      tags: [Family Groups]
      operationId: createFamily
      summary: Create a new family group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyRequest"
      responses:
        "201":
          description: Family group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /families/{id}:
    parameters:
      - $ref: "#/components/parameters/FamilyIdPath"
    get:
      tags: [Family Groups]
      operationId: getFamily
      summary: Get family group details
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Family group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Family Groups]
      operationId: updateFamily
      summary: Update family settings (currency, alerts, name) - Admin only
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFamilyRequest"
      responses:
        "200":
          description: Family updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Family Groups]
      operationId: deleteFamily
      summary: Delete or leave family group
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Family deleted/left
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /families/{id}/invite:
    parameters:
      - $ref: "#/components/parameters/FamilyIdPath"
    post:
      tags: [Family Groups]
      operationId: inviteToFamily
      summary: Generate invite link or send email invite (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteRequest"
      responses:
        "200":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"

  /families/{id}/join:
    parameters:
      - $ref: "#/components/parameters/FamilyIdPath"
    post:
      tags: [Family Groups]
      operationId: joinFamily
      summary: Join family via invite code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinFamilyRequest"
      responses:
        "200":
          description: Joined family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "400":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /families/{id}/members:
    parameters:
      - $ref: "#/components/parameters/FamilyIdPath"
    get:
      tags: [Family Groups]
      operationId: listFamilyMembers
      summary: List family members
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMember"

  /families/{id}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/FamilyIdPath"
      - name: memberId
        in: path
        required: true
        schema:
          type: string
    put:
      tags: [Family Groups]
      operationId: updateMember
      summary: Update member role/permissions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
    delete:
      tags: [Family Groups]
      operationId: removeMember
      summary: Remove member from family
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Member removed

  # ─────────────────────── CATEGORIES ────────────────────────
  /families/{fid}/categories:
    parameters:
      - $ref: "#/components/parameters/FamilyFidPath"
    get:
      tags: [Categories]
      operationId: listCategories
      summary: List all categories for a family
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      tags: [Categories]
      operationId: createCategory
      summary: Create a category (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /families/{fid}/categories/{id}:
    parameters:
      - $ref: "#/components/parameters/FamilyFidPath"
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      tags: [Categories]
      operationId: updateCategory
      summary: Update category (name, icon, budget) (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      tags: [Categories]
      operationId: deleteCategory
      summary: Delete category (Admin only)
      description: Deleting a category will reassign all associated transactions to "Uncategorized".
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Category deleted

  # ─────────────────────── TRANSACTIONS ──────────────────────
  /families/{fid}/transactions:
    parameters:
      - $ref: "#/components/parameters/FamilyFidPath"
    get:
      tags: [Transactions]
      operationId: listTransactions
      summary: List transactions (paginated, filterable)
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/TransactionType"
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: categoryId
          in: query
          schema:
            type: string
        - name: createdByUserId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            default: transactionDate,desc
      responses:
        "200":
          description: Paginated transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionPage"
    post:
      tags: [Transactions]
      operationId: createTransaction
      summary: Create a transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /families/{fid}/transactions/{id}:
    parameters:
      - $ref: "#/components/parameters/FamilyFidPath"
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Transactions]
      operationId: getTransaction
      summary: Get transaction detail
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Transactions]
      operationId: updateTransaction
      summary: Update transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionRequest"
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      tags: [Transactions]
      operationId: deleteTransaction
      summary: Delete transaction
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Transaction deleted

  # ─────────────────────── MESSAGES (SMS PROCESSING) ─────────
  /messages/process:
    post:
      tags: [Messages]
      operationId: processMessage
      summary: Submit unprocessed SMS for LLM analysis
      description: >
        Sends raw SMS text to the server for Gemini LLM analysis.
        If the message is financial, validates & posts the transaction first.
        Only if transaction validation passes, the LLM-generated regex is saved to the pattern registry.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessMessageRequest"
      responses:
        "200":
          description: Message analyzed by LLM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessMessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/pending:
    get:
      tags: [Messages]
      operationId: getPendingMessages
      summary: Get pending messages for triage (incomplete or unprocessed)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /messages/ignored:
    get:
      tags: [Messages]
      operationId: getIgnoredMessages
      summary: Get non-financial / deleted messages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Ignored messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /messages/{id}/confirm:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Messages]
      operationId: confirmMessage
      summary: Confirm parsed transaction
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Message confirmed, transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /messages/{id}/reject:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Messages]
      operationId: rejectMessage
      summary: Reject / ignore message
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Message rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}/restore:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Messages]
      operationId: restoreMessage
      summary: Restore an ignored message
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Message restored to pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ─────────────────── PATTERN REGISTRY ───────────────────────
  /patterns:
    get:
      tags: [Pattern Registry]
      operationId: getPatterns
      summary: Get all active regex patterns (full or delta sync)
      description: >
        Returns all active patterns from the global pattern registry.
        Supports delta sync via the `since` query parameter — returns only patterns
        created or updated after the given timestamp.
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          description: ISO 8601 timestamp for delta sync (returns patterns created/updated after this time)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: List of active patterns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmsPattern"

  /patterns/senders:
    get:
      tags: [Pattern Registry]
      operationId: getPatternSenders
      summary: Get list of known senders with pattern counts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sender list with counts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    sender:
                      type: string
                    patternCount:
                      type: integer

  /patterns/{id}/report:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Pattern Registry]
      operationId: reportPattern
      summary: Report an incorrect pattern
      description: >
        Flags a pattern as incorrect. If report count exceeds threshold,
        the pattern is auto-removed from the registry and moved to rejected_patterns.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatternReportRequest"
      responses:
        "200":
          description: Pattern reported
          content:
            application/json:
              schema:
                type: object
                properties:
                  patternId:
                    type: string
                  reportCount:
                    type: integer
                  removed:
                    type: boolean
                    description: True if pattern was auto-removed due to exceeding report threshold

  /patterns/stats:
    get:
      tags: [Pattern Registry]
      operationId: getPatternStats
      summary: Pattern library statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pattern statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternStatsResponse"

  # ─────────────────── DASHBOARD / BUDGET ────────────────────
  /families/{fid}/dashboard:
    parameters:
      - $ref: "#/components/parameters/FamilyFidPath"
    get:
      tags: [Dashboard]
      operationId: getDashboard
      summary: Aggregated dashboard data
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          description: Month in YYYY-MM format (defaults to current month)
          schema:
            type: string
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /families/{fid}/budget/summary:
    parameters:
      - $ref: "#/components/parameters/FamilyFidPath"
    get:
      tags: [Dashboard]
      operationId: getBudgetSummary
      summary: Monthly budget summary with per-category breakdowns
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Budget summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetSummary"

  /families/{fid}/budget:
    parameters:
      - $ref: "#/components/parameters/FamilyFidPath"
    put:
      tags: [Dashboard]
      operationId: updateBudget
      summary: Update overall monthly budget limit
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetRequest"
      responses:
        "200":
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"

components:
  # ─────────────────── SECURITY ──────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─────────────────── PARAMETERS ────────────────────────────
  parameters:
    FamilyIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Family group ID

    FamilyFidPath:
      name: fid
      in: path
      required: true
      schema:
        type: string
      description: Family group ID

  # ─────────────────── SCHEMAS ───────────────────────────────
  schemas:
    # ── Auth ──
    GoogleSignInRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Google ID token from client-side sign-in

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiry in seconds
        user:
          $ref: "#/components/schemas/User"

    # ── User ──
    User:
      type: object
      properties:
        id:
          type: string
        googleId:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time

    # ── Family Group ──
    FamilyGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatarInitial:
          type: string
        defaultCurrency:
          type: string
          default: INR
        regionFormat:
          type: string
          default: IN
        expenseAlertsEnabled:
          type: boolean
          default: true
        monthlyBudgetLimit:
          type: number
          format: double
        createdByUserId:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateFamilyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        avatarInitial:
          type: string
        defaultCurrency:
          type: string
          default: INR
        monthlyBudgetLimit:
          type: number
          format: double
          default: 50000

    UpdateFamilyRequest:
      type: object
      properties:
        name:
          type: string
        avatarInitial:
          type: string
        defaultCurrency:
          type: string
        regionFormat:
          type: string
        expenseAlertsEnabled:
          type: boolean
        monthlyBudgetLimit:
          type: number
          format: double

    # ── Family Member ──
    FamilyMember:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        familyGroupId:
          type: string
        user:
          $ref: "#/components/schemas/User"
        role:
          $ref: "#/components/schemas/MemberRole"
        status:
          $ref: "#/components/schemas/MemberStatus"
        joinedAt:
          type: string
          format: date-time

    MemberRole:
      type: string
      enum: [ADMIN, MEMBER]

    MemberStatus:
      type: string
      enum: [ACTIVE, INVITED, REMOVED]

    UpdateMemberRequest:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/MemberRole"

    InviteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        method:
          type: string
          enum: [EMAIL, LINK, QR]

    InviteResponse:
      type: object
      properties:
        inviteCode:
          type: string
        inviteLink:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time

    JoinFamilyRequest:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    # ── Category ──
    Category:
      type: object
      properties:
        id:
          type: string
        familyGroupId:
          type: string
        name:
          type: string
        icon:
          type: string
        budgetLimit:
          type: number
          format: double
        color:
          type: string
          description: Hex color code
        sortOrder:
          type: integer

    CreateCategoryRequest:
      type: object
      required: [name, icon]
      properties:
        name:
          type: string
        icon:
          type: string
        budgetLimit:
          type: number
          format: double
        color:
          type: string
        sortOrder:
          type: integer

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        budgetLimit:
          type: number
          format: double
        color:
          type: string
        sortOrder:
          type: integer

    # ── Transaction ──
    Transaction:
      type: object
      properties:
        id:
          type: string
        familyGroupId:
          type: string
        createdByUserId:
          type: string
        createdByUser:
          $ref: "#/components/schemas/User"
        categoryId:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        amount:
          type: number
          format: double
        currency:
          type: string
          default: INR
        merchant:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/TransactionType"
        sourceType:
          $ref: "#/components/schemas/SourceType"
        sourceRawText:
          type: string
        matchedPatternId:
          type: string
          description: ID of the regex pattern that parsed this transaction (if sourceType is REGEX_LOCAL)
        notes:
          type: string
        transactionDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    TransactionType:
      type: string
      enum: [EXPENSE, INCOME, SUBSCRIPTION]

    SplitMethod:
      type: string
      enum: [PERSONAL, PERCENT, SHARE]

    SourceType:
      type: string
      enum: [MANUAL, REGEX_LOCAL, LLM_SERVER]

    CreateTransactionRequest:
      type: object
      required: [amount, merchant, type, categoryId, transactionDate]
      properties:
        amount:
          type: number
          format: double
        currency:
          type: string
          default: INR
        merchant:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/TransactionType"
        categoryId:
          type: string
        splitMethod:
          $ref: "#/components/schemas/SplitMethod"
        splitConfig:
          type: object
          additionalProperties:
            type: number
        notes:
          type: string
        transactionDate:
          type: string
          format: date-time

    UpdateTransactionRequest:
      type: object
      properties:
        amount:
          type: number
          format: double
        merchant:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/TransactionType"
        categoryId:
          type: string
        splitMethod:
          $ref: "#/components/schemas/SplitMethod"
        splitConfig:
          type: object
          additionalProperties:
            type: number
        notes:
          type: string
        transactionDate:
          type: string
          format: date-time

    TransactionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        last:
          type: boolean

    # ── Message ──
    Message:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        familyGroupId:
          type: string
        sender:
          type: string
        rawText:
          type: string
        status:
          $ref: "#/components/schemas/MessageStatus"
        parseSource:
          $ref: "#/components/schemas/ParseSource"
        matchedPatternId:
          type: string
          description: ID of the regex pattern that matched (if parseSource is REGEX_LOCAL)
        parsedTransaction:
          $ref: "#/components/schemas/CreateTransactionRequest"
        linkedTransactionId:
          type: string
        receivedAt:
          type: string
          format: date-time

    MessageStatus:
      type: string
      enum: [PENDING, CONFIRMED, REJECTED, IGNORED]

    ParseSource:
      type: string
      enum: [REGEX_LOCAL, LLM_SERVER, MANUAL]

    ProcessMessageRequest:
      type: object
      required: [sender, rawText, familyGroupId]
      properties:
        sender:
          type: string
          description: SMS sender ID (e.g. "HDFCBK", "SBIUPI")
        rawText:
          type: string
          description: Full raw SMS text
        familyGroupId:
          type: string

    ProcessMessageResponse:
      type: object
      properties:
        isFinancial:
          type: boolean
          description: Whether the LLM classified this message as financial
        parsedData:
          $ref: "#/components/schemas/CreateTransactionRequest"
        generatedPattern:
          $ref: "#/components/schemas/SmsPattern"
        transactionId:
          type: string
          description: ID of the created transaction (if financial and validation passed)
        message:
          $ref: "#/components/schemas/Message"

    # ── SMS Pattern Registry ──
    SmsPattern:
      type: object
      properties:
        id:
          type: string
        sender:
          type: string
          description: SMS sender ID (e.g. "HDFCBK", "SBIUPI", "ICICIB")
        regex:
          type: string
          description: Java/Dart-compatible regex pattern with named capture groups
        extractionMap:
          $ref: "#/components/schemas/ExtractionMap"
        sampleMessage:
          type: string
          description: The original SMS that generated this pattern
        usageCount:
          type: integer
          format: int64
          description: Global counter of successful matches across all users
        createdAt:
          type: string
          format: date-time

    ExtractionMap:
      type: object
      description: Maps regex capture groups to transaction fields. amount, merchant, and timestamp are mandatory.
      required: [amount, merchant, timestamp]
      properties:
        amount:
          type: string
          description: Capture group name for amount
        merchant:
          type: string
          description: Capture group name for merchant
        timestamp:
          type: string
          description: Capture group name for timestamp
        accountLast4:
          type: string
          description: Capture group name for last 4 digits of account (optional)
        type:
          type: string
          description: Capture group name for debit/credit type (optional)

    RejectedPattern:
      type: object
      properties:
        id:
          type: string
        patternId:
          type: string
        regex:
          type: string
          description: Snapshot of the rejected regex
        sampleMessage:
          type: string
        reportedByUserIds:
          type: array
          items:
            type: string
        reportCount:
          type: integer
        rejectedAt:
          type: string
          format: date-time

    PatternReportRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          description: Why the pattern is incorrect (e.g. "Extracted wrong amount", "Wrong merchant")
        sampleMessage:
          type: string
          description: The SMS text that was incorrectly parsed

    PatternStatsResponse:
      type: object
      properties:
        totalPatterns:
          type: integer
        totalSenders:
          type: integer
        totalUsage:
          type: integer
          format: int64
          description: Sum of all pattern usage counts
        topSenders:
          type: array
          items:
            type: object
            properties:
              sender:
                type: string
              patternCount:
                type: integer
              totalUsage:
                type: integer
                format: int64

    # ── Dashboard ──
    DashboardData:
      type: object
      properties:
        monthlyBudgetLimit:
          type: number
          format: double
        totalSpent:
          type: number
          format: double
        leftToSpend:
          type: number
          format: double
        dailyAverage:
          type: number
          format: double
        projectedSpend:
          type: number
          format: double
        estimatedSavings:
          type: number
          format: double
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
          maxItems: 5
        pendingMessageCount:
          type: integer

    BudgetSummary:
      type: object
      properties:
        month:
          type: string
          description: YYYY-MM format
        overallLimit:
          type: number
          format: double
        overallSpent:
          type: number
          format: double
        categoryBreakdowns:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBudgetBreakdown"

    CategoryBudgetBreakdown:
      type: object
      properties:
        category:
          $ref: "#/components/schemas/Category"
        budgetLimit:
          type: number
          format: double
        spent:
          type: number
          format: double
        isOverBudget:
          type: boolean

    UpdateBudgetRequest:
      type: object
      required: [monthlyBudgetLimit]
      properties:
        monthlyBudgetLimit:
          type: number
          format: double

    # ── Common ──
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
