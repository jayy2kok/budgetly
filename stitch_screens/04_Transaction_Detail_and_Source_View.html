<!DOCTYPE html>

<script id="tailwind-config">

            theme: {
                extend: {

                }
            }
        };

<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-app-bg text-text-main antialiased;
                -webkit-tap-highlight-color: transparent;
            }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-item {
            @apply flex flex-col items-center justify-center gap-1 transition-all duration-200;
        }
        .nav-item.active {
            @apply text-primary;
        }
        .nav-item.inactive {
            @apply text-text-muted hover:text-slate-300;
        }
        input, textarea, select {
            @apply focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition-all;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex items-center justify-center p-0 sm:p-4">

</button>

</button>
<button class="text-text-muted hover:text-text-main p-2 -mr-2 rounded-full transition-colors">

</button>
</div>
</div>
<div class="flex-1 overflow-y-auto px-6 pb-32 custom-scrollbar">

</div>

                        </span>
</div>

<div class="mt-3 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary">auto_awesome</span>

</div>
</div>

<textarea class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-sm text-slate-200 h-28 resize-none placeholder:text-slate-600" placeholder="Add additional details..."></textarea>
</div>

</button>

<span class="material-symbols-outlined text-[28px] fill-1">receipt_long</span>

</button>

<div class="w-32 h-1 bg-slate-700 rounded-full"></div>
