<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Unified Group Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Ibm+Plex+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#6366f1", // Indigo 500
                        "background-light": "#f8fafc", // Slate 50
                        "background-dark": "#0f172a", // Slate 900
                        slate: {
                            850: "#1e293b",
                            950: "#020617"
                        }
                    },
                    fontFamily: {
                        display: "Ibm Plex Sans"
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        lg: "1rem",
                        xl: "1.5rem",
                        full: "9999px"
                    }
                }
            }
        };
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30;
                min-height: 100dvh;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-tab .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden pb-24 shadow-2xl bg-white dark:bg-slate-950">
<div class="flex items-center sticky top-0 z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<button class="text-slate-600 dark:text-slate-400 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Family Settings</h2>
</div>
<div class="flex flex-col items-center justify-center pt-10 pb-8 px-4">
<div class="relative mb-4">
<div class="h-28 w-28 rounded-full bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center text-white text-4xl font-bold shadow-2xl shadow-indigo-500/20">
                    S
                </div>
<div class="absolute bottom-1 right-1 bg-white dark:bg-slate-950 p-1.5 rounded-full">
<div class="bg-emerald-500 h-5 w-5 rounded-full border-2 border-white dark:border-slate-950"></div>
</div>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-1">The Smith Family</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Managed by John Smith</p>
</div>
<div class="px-4 py-2">
<h3 class="text-indigo-600 dark:text-indigo-400 text-[11px] font-bold uppercase tracking-[0.1em] mb-3 pl-1">Localization</h3>
<div class="flex flex-col gap-px bg-slate-100 dark:bg-slate-800 rounded-2xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800">
<div class="bg-white dark:bg-slate-900 p-4">
<label class="flex flex-col w-full">
<span class="text-slate-600 dark:text-slate-400 text-xs font-semibold mb-2 ml-1">Default Currency</span>
<div class="relative">
<select class="appearance-none flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-indigo-500/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-12 pl-4 pr-10 text-sm font-medium transition-all hover:bg-slate-100 dark:hover:bg-slate-800">
<option value="USD">USD - US Dollar ($)</option>
<option value="EUR">EUR - Euro (€)</option>
<option value="GBP">GBP - British Pound (£)</option>
<option selected="" value="INR">INR - Indian Rupee (₹)</option>
<option value="JPY">JPY - Japanese Yen (¥)</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
<span class="material-symbols-outlined text-xl">unfold_more</span>
</div>
</div>
</label>
</div>
<div class="bg-white dark:bg-slate-900 p-4">
<label class="flex flex-col w-full">
<span class="text-slate-600 dark:text-slate-400 text-xs font-semibold mb-2 ml-1">Region Format</span>
<div class="relative">
<select class="appearance-none flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-indigo-500/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-12 pl-4 pr-10 text-sm font-medium transition-all hover:bg-slate-100 dark:hover:bg-slate-800">
<option value="US">United States (MM/DD/YYYY)</option>
<option value="UK">United Kingdom (DD/MM/YYYY)</option>
<option selected="" value="IN">India (DD/MM/YYYY)</option>
<option value="DE">Germany (DD.MM.YYYY)</option>
<option value="JP">Japan (YYYY/MM/DD)</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
<span class="material-symbols-outlined text-xl">unfold_more</span>
</div>
</div>
</label>
</div>
</div>
</div>
<div class="px-4 py-2 mt-6">
<h3 class="text-indigo-600 dark:text-indigo-400 text-[11px] font-bold uppercase tracking-[0.1em] mb-3 pl-1">Preferences</h3>
<div class="bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400">
<span class="material-symbols-outlined">notifications_active</span>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-white text-sm font-semibold">Expense Alerts</span>
<span class="text-[11px] text-slate-500 dark:text-slate-400">Notify group on high spending</span>
</div>
</div>
<div class="relative inline-flex h-6 w-11 items-center rounded-full bg-indigo-600 transition-colors">
<span class="translate-x-6 inline-block h-4 w-4 transform rounded-full bg-white transition-transform shadow-sm"></span>
</div>
</div>
<div class="h-px w-[calc(100%-1rem)] mx-auto bg-slate-100 dark:bg-slate-800"></div>
<div class="flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400">
<span class="material-symbols-outlined">category</span>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-white text-sm font-semibold">Categories</span>
<span class="text-[11px] text-slate-500 dark:text-slate-400">Manage budget categories</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400 dark:text-slate-600 text-xl">chevron_right</span>
</div>
<div class="h-px w-[calc(100%-1rem)] mx-auto bg-slate-100 dark:bg-slate-800"></div>
<div class="flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400">
<span class="material-symbols-outlined">group</span>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-white text-sm font-semibold">Member Permissions</span>
<span class="text-[11px] text-slate-500 dark:text-slate-400">Invite and manage roles</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-400 dark:text-slate-600 text-xl">chevron_right</span>
</div>
</div>
</div>
<div class="px-4 mt-10 mb-6">
<button class="w-full py-4 rounded-2xl border border-red-200 dark:border-red-900/30 bg-red-50/30 dark:bg-red-950/20 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/40 transition-all flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">logout</span>
<span class="font-bold text-sm tracking-wide">Leave Family Group</span>
</button>
</div>
<div class="fixed bottom-0 w-full max-w-md bg-white/90 dark:bg-slate-950/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 pb-8 pt-3 px-6 flex justify-between items-center z-50">
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-indigo-600 transition-colors w-16">
<span class="material-symbols-outlined text-[26px]">home</span>
<span class="text-[10px] font-semibold">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-indigo-600 transition-colors w-16">
<span class="material-symbols-outlined text-[26px]">rss_feed</span>
<span class="text-[10px] font-semibold">Feed</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-indigo-600 transition-colors w-16">
<span class="material-symbols-outlined text-[26px]">account_balance_wallet</span>
<span class="text-[10px] font-semibold">Budget</span>
</button>
<button class="flex flex-col items-center gap-1 text-indigo-600 dark:text-indigo-400 w-16 active-tab">
<span class="material-symbols-outlined text-[26px]">settings</span>
<span class="text-[10px] font-bold">Settings</span>
</button>
</div>
</div>

</body></html>
